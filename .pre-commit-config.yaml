repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.9.0
          - pydantic-settings>=2.6.0
          - fastapi>=0.115.0
          - redis>=5.0.0
          - types-PyYAML
          - loguru>=0.7.0
          - pytest>=8.0.0
          - fakeredis>=2.0.0
          - pytest-asyncio>=0.23.0
          - httpx>=0.28.0
          - respx>=0.22.0
          - jinja2>=3.1.0
          - responses>=0.25.0
        args: [--strict]
        files: ^(app|tests)/
