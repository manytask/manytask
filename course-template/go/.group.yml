version: 1

# Go tasks run the solution together with a test driver via `go run`; a non-zero
# exit code fails the stage. The solution (add.go) and the driver (test_*.go) are
# both `package main` — the solution has no main(), each driver does, so exactly
# one main() is compiled per stage. Files are passed explicitly, so this works in
# GOPATH mode (no go.mod); the image sets GO111MODULE=off and a writable GOCACHE.
# Overrides the default run_pytest tasks_pipeline (.checker.yml) for the go/ group.
task_pipeline:
  - name: "Run public tests"
    run_if: ${{ parameters.run_testing }}
    fail: fast
    run: "run_script"
    args:
      origin: "${{ global.temp_dir }}/${{ task.task_sub_path }}"
      script: "go run add.go test_public.go"
      timeout: ${{ parameters.timeout }}

  - name: "Run private tests"
    run_if: ${{ parameters.run_testing }}
    fail: fast
    run: "run_script"
    args:
      origin: "${{ global.temp_dir }}/${{ task.task_sub_path }}"
      script: "go run add.go test_private.go"
      timeout: ${{ parameters.timeout }}
