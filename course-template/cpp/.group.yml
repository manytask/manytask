version: 1

# C++ tasks compile the student's solution together with a test driver and run
# the resulting binary; a non-zero exit code fails the stage. This task_pipeline
# overrides the default run_pytest tasks_pipeline (.checker.yml) for every task in
# the cpp/ group. Two stages mirror the python flow: public tests first (fail fast),
# then the hidden private tests baked into the testenv image.
task_pipeline:
  - name: "Compile & run public tests"
    run_if: ${{ parameters.run_testing }}
    fail: fast
    run: "run_script"
    args:
      origin: "${{ global.temp_dir }}/${{ task.task_sub_path }}"
      script: "g++ -std=c++17 -O2 -Wall -Werror add.cpp test_public.cpp -o /tmp/cpp_public && /tmp/cpp_public"
      timeout: ${{ parameters.timeout }}

  - name: "Compile & run private tests"
    run_if: ${{ parameters.run_testing }}
    fail: fast
    run: "run_script"
    args:
      origin: "${{ global.temp_dir }}/${{ task.task_sub_path }}"
      script: "g++ -std=c++17 -O2 -Wall -Werror add.cpp test_private.cpp -o /tmp/cpp_private && /tmp/cpp_private"
      timeout: ${{ parameters.timeout }}
