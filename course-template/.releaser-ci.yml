# CI pipeline executed in the INSTRUCTOR private repository.
# On push to main: exports tasks to the public student repository
# and updates the deadlines on the Manytask web application.

stages:
  - validate
  - test
  - deploy

variables:
  PIP_CACHE_DIR: "${CI_PROJECT_DIR}/.cache/pip"
  # checker is installed from the manytask monorepo @main, not PyPI: the latest
  # PyPI release (0.9.2) predates the `validate`/`export` commands this template
  # relies on. `@main` tracks the latest checker on purpose — switch to a pinned
  # PyPI version (`manytask-checker>=X`) once a release with these commands ships.
  #
  # The jobs below run `pip install "$CHECKER_PIP_SPEC" pytest`: checker does not
  # bundle a test runner (it is runner-agnostic), so the course provides pytest.
  CHECKER_PIP_SPEC: "git+https://github.com/manytask/manytask.git@main#subdirectory=checker"

validate:
  image: python:3.12-slim
  stage: validate
  before_script:
    - apt-get update -qq && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*
    - python -m pip install --upgrade pip
    - pip install "$CHECKER_PIP_SPEC" pytest
  script:
    - checker validate

# Runs the reference solution through the full task pipeline — public AND
# private tests — on a live runner. In the private repo `reference_root`
# defaults to `.`, which already contains test_private.py, so this is where
# private grading is exercised end-to-end (the student grade job needs the
# testenv image to get the private tests; see .gitlab-ci.yml).
check:
  image: python:3.12-slim
  stage: test
  before_script:
    - apt-get update -qq && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*
    - python -m pip install --upgrade pip
    - pip install "$CHECKER_PIP_SPEC" pytest
  script:
    - checker check

deploy-public:
  image: python:3.12-slim
  stage: deploy
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: on_success
    - when: never
  variables:
    # Authenticated URL for cloning/pushing the public repository.
    # GITLAB_API_TOKEN is a group/project CI/CD variable with write_repository scope.
    PUBLIC_REPO_URL: "https://oauth2:${GITLAB_API_TOKEN}@gitlab.manytask2.org/sandbox/public.git"
  before_script:
    - apt-get update -qq && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*
    - python -m pip install --upgrade pip
    - pip install "$CHECKER_PIP_SPEC" pytest
    - git config --global user.email "ci@manytask.org"
    - git config --global user.name "Manytask CI"
    # `checker export --commit` runs git inside ./export and pushes via the
    # remote it finds there. Pre-clone the public repo (or init if empty) so
    # git does not bubble up into the private-repo CI checkout (detached HEAD).
    - |
      if ! git clone "$PUBLIC_REPO_URL" ./export; then
        mkdir -p ./export
        cd ./export
        git init
        git remote add origin "$PUBLIC_REPO_URL"
        cd ..
      fi
      cd ./export
      git checkout -B main
      cd ..
  script:
    - checker export --commit
    - |
      if [ -n "$MANYTASK_TOKEN" ]; then
        checker manytask update
      else
        echo "Skipping 'checker manytask update' — MANYTASK_TOKEN not set (app.manytask2.org currently down)"
      fi
