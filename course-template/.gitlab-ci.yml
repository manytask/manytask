# CI pipeline executed in the STUDENT public repository.
# Runs the checker against each student's submission and reports
# the score back to the Manytask web application.

stages:
  - grade

variables:
  PIP_CACHE_DIR: "${CI_PROJECT_DIR}/.cache/pip"
  # checker is installed from the manytask monorepo @main, not PyPI: the latest
  # PyPI release (0.9.2) predates the `grade` behavior this template relies on.
  # `@main` tracks the latest checker on purpose — switch to a pinned PyPI
  # version (`manytask-checker>=X`) once a release with these commands ships.
  #
  # The job below runs `pip install "$CHECKER_PIP_SPEC" pytest`: checker does not
  # bundle a test runner (it is runner-agnostic), so the course provides pytest.
  CHECKER_PIP_SPEC: "git+https://github.com/manytask/manytask.git@main#subdirectory=checker"

grade:
  # NOTE (iteration 2): `checker grade` overlays the PRIVATE tests from its
  # reference_root onto the student's solution. In the public/student repo
  # reference_root defaults to `.`, which does NOT contain test_private.py, so
  # the private step has nothing to run here. The intended fix is to set
  # `image:` to the course testenv image (built by .releaser-ci.yml with the
  # private tests baked in) and run `checker grade . <baked-reference-path>`.
  # Until that image is wired, only the public tests grade. The private
  # pipeline is verified live by the `check` job in .releaser-ci.yml.
  image: python:3.12-slim
  stage: grade
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      when: on_success
    - when: never
  before_script:
    - apt-get update -qq && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*
    - python -m pip install --upgrade pip
    - pip install "$CHECKER_PIP_SPEC" pytest
  script:
    - checker grade
  cache:
    paths:
      - .cache/pip
