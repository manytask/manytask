# Simple workflow for deploying static content to GitHub Pages
name: Build landing and docs and deploy to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Runs on pull requests to any branch to validate docs build
  pull_request:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build-only job for pull requests to validate docs can be built successfully
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Build
        uses: diplodoc-platform/docs-build-action@v3
        with:
          src-root: './docs'
          build-root: './build'
          lint-root: './html'

  # Deploy job runs only on push to main or manual trigger
  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Build
        uses: diplodoc-platform/docs-build-action@v3
        with:
          src-root: './docs'
          build-root: './build'
          lint-root: './html'
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './html'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
