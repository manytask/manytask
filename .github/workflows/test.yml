name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'

permissions:
  contents: read
      
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install UV
        uses: astral-sh/setup-uv@v6
        with:
          version: 0.9.5

      - name: Install dependencies
        working-directory: manytask
        run: uv sync --locked --all-extras

      - name: Run ruff format
        working-directory: manytask
        run: uv run ruff format --check .

      - name: Run ruff check
        working-directory: manytask
        run: uv run ruff check .

      - name: Run mypy
        working-directory: manytask
        run: uv run mypy manytask

      - name: Run manytask tests
        working-directory: manytask
        run: uv run pytest

      - name: Run checker tests (skip firejail like upstream checker CI)
        working-directory: checker
        run: PYTHONPATH=. uv run pytest -c /dev/null --rootdir=. --import-mode=importlib --skip-firejail tests

  build-docker:
    needs: test
    uses: manytask/workflows/.github/workflows/reusable-docker-build-push.yml@main
    with:
      context: manytask
      tags: manytask:${{ github.sha }}
