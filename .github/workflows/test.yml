name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  # Install toolchain once per job; reuse repo Make targets (`make lint`, `make run-*-tests`)
  # so local checks match CI (see manytask/Makefile and checker/Makefile).

  lint-manytask:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.14'

      - name: Install UV
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: 0.9.5

      - name: Install dependencies (manytask + editable checker)
        working-directory: manytask
        run: |
          uv sync --locked --all-extras
          uv pip install -e ../checker

      - name: Lint (make lint)
        working-directory: manytask
        run: make lint

  test-manytask:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.14'

      - name: Install UV
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: 0.9.5

      - name: Install dependencies (manytask + editable checker)
        working-directory: manytask
        run: |
          uv sync --locked --all-extras
          uv pip install -e ../checker

      - name: Test (make copy-common-config run-manytask-tests)
        working-directory: manytask
        run: |
          make copy-common-config
          make run-manytask-tests

  lint-checker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.14'

      - name: Install UV
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: 0.9.5

      - name: Install dependencies
        working-directory: checker
        run: uv sync --locked --extra dev

      - name: Lint (make lint)
        working-directory: checker
        run: make lint

  test-checker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.14'

      - name: Install UV
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: 0.9.5

      - name: Install dependencies
        working-directory: checker
        run: uv sync --locked --extra dev

      - name: Test (make copy-common-config run-checker-tests)
        working-directory: checker
        run: |
          make copy-common-config
          make run-checker-tests

  lint-mr-reviewer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.14'

      - name: Install UV
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: 0.9.5

      - name: Install dependencies
        working-directory: mr-reviewer
        run: uv sync --locked

      - name: Lint (make lint)
        working-directory: mr-reviewer
        run: make lint

  test-mr-reviewer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.14'

      - name: Install UV
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: 0.9.5

      - name: Install dependencies
        working-directory: mr-reviewer
        run: uv sync --locked

      - name: Test (make run-mr-reviewer-tests)
        working-directory: mr-reviewer
        run: make run-mr-reviewer-tests

  build-docker:
    needs:
      - lint-manytask
      - test-manytask
      - lint-checker
      - test-checker
    uses: manytask/workflows/.github/workflows/reusable-docker-build-push.yml@main
    with:
      # Repository root: Dockerfile COPY paths are manytask/… (see manytask/Dockerfile).
      context: .
      dockerfile: manytask/Dockerfile
      tags: manytask:${{ github.sha }}

  build-docker-mr-reviewer:
    needs:
      - lint-mr-reviewer
      - test-mr-reviewer
    uses: manytask/workflows/.github/workflows/reusable-docker-build-push.yml@main
    with:
      context: .
      dockerfile: mr-reviewer/Dockerfile
      target: app
      tags: manytask-mr-reviewer:${{ github.sha }}
