# Unified flat config for a private course (example)

version: 1

# --- checker (.checker.yml) ---
default_parameters:
  run_testing: true
structure:
  ignore_patterns: [".git", ".idea", "__pycache__", "*.pyc"]
  public_patterns: ["*", ".gitignore", ".gitlab-ci-students.yml"]
  private_patterns: [".*", "test_private.py", "data_private"]
export:
  destination: https://git.example.com/course/public-repo
  default_branch: main
  commit_message: "chore(auto): export new tasks"
  templates: search
testing:
  changes_detection: last_commit_changes
  search_plugins: []
  global_pipeline: []
  tasks_pipeline: []
  report_pipeline: []

# --- manytask (.manytask.yml) ---
settings:
  course_name: python
  gitlab_base_url: https://gitlab.manytask.org
  public_repo: python/public-2022-fall
  students_group: python/students-fall-2022
ui:
  task_url_template: https://gitlab.manytask.org/test/$GROUP_NAME/$USER_NAME/$TASK_NAME
  links:
    "TG Channel": https://t.me/joinchat/
    "TG Chat": https://t.me/joinchat/
    "LMS": https://lk.yandexdataschool.ru/
    "Contribute Manytask": https://github.com/manytask
deadlines:
  timezone: Europe/Moscow
  deadlines: hard
  max_submissions: 10
  submission_penalty: 0.1
  schedule:
    - group: group_0
      start: 2024-01-01 18:00
      steps:
        0.5: 2024-04-30 23:59
      end: 2030-05-31 23:59
      enabled: true
      tasks:
        - task: task_0_0
          score: 10
          is_bonus: true
        - task: task_0_1
          score: 10
        - task: task_0_2
          score: 10
        - task: task_0_3
          score: 10
          is_bonus: true
        - task: task_0_4
          score: 10
        - task: task_0_5
          score: 10
grades:
  grades:
    5:
      - percent: 90
        large_count: 1
      - percent: 80
        large_count: 2
    4:
      - percent: 80
        large_count: 1
    3:
      - percent: 70
    2:
      - {"": 0}
