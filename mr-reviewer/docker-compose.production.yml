# mr-reviewer production stack — joins the shared manytask edge proxy.
# Brought up via compose/docker-compose.production.yml (umbrella include).
# The shared edge proxy + nginx-manytask-net network are owned by
# compose/docker-compose.proxy.yml and must be up first (once per host).
networks:
  manytask-net:
    external: true
    name: nginx-manytask-net

volumes:
  mrr-redis-data:

services:
  mrr-redis:
    image: redis:7-alpine
    container_name: mrr-redis
    restart: always
    # Persist to the mrr-redis-data volume with append-only file (AOF) so a
    # restart keeps the registered course configs and the processed-comment
    # dedupe set — otherwise the bot re-scans every reviewed MR after a bounce
    # and can re-report scores.
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    networks: [manytask-net]
    volumes:
      - mrr-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mrr-bot:
    # Pull the pre-built image published by .github/workflows/publish.yml
    # (manytask/mr-reviewer:<release-tag>) instead of building on the host.
    # The registry carries no `latest`, so pin the released tag on the host:
    #   MR_REVIEWER_TAG=<release-tag>  (e.g. in manytask/.env)
    image: manytask/mr-reviewer:${MR_REVIEWER_TAG:-latest}
    container_name: mrr-bot
    restart: always
    env_file: .env
    environment:
      VIRTUAL_HOST: bot.manytask2.org
      VIRTUAL_PORT: 8000
      LETSENCRYPT_HOST: bot.manytask2.org
      LETSENCRYPT_EMAIL: no-reply@manytask.org
    expose:
      - "8000"
    networks: [manytask-net]
    depends_on:
      mrr-redis:
        condition: service_healthy
